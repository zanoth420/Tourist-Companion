<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Trips — Tourist Companion</title>
  <link rel="icon" href="favicon.png" />
  <script src="js/theme.js"></script>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <header class="app-header">
    <div class="logo">Tourist Companion</div>
    <nav id="nav"></nav>
  </header>

  <main>
    <h1>My trips</h1>
    <p class="subtitle">Your saved itineraries. Click one to see the full day-by-day plan.</p>
    <div id="status"></div>
    <div id="list"></div>
    <div id="detail"></div>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/itinerary.js"></script>
  <script src="js/map.js"></script>
  <script>
    const $ = id => document.getElementById(id);
    let currentTrip = null;

    renderAuthNav('nav').then(me => {
      if (!me) { window.location.href = 'Login.html?next=mytrips.html'; return; }
      loadTrips();
    });

    async function loadTrips() {
      const trips = await (await fetch('/api/trips')).json();
      if (!trips.length) {
        $('list').innerHTML = `<div class="card">No saved trips yet —
          <a href="build.html">build one</a> and hit “Save this trip”.</div>`;
        return;
      }
      $('list').innerHTML = trips.map(t => `
        <div class="trip-row" data-id="${t.id}">
          <span class="t-name">${escapeHtml(t.name)}</span>
          <span class="t-meta">${t.days} day${t.days > 1 ? 's' : ''} ·
            ${t.total_places} places · ${t.total_cost} EGP ·
            saved ${t.created_at.slice(0, 10)}${t.share_token ? ' · 🔗 shared' : ''}</span>
          <button class="btn secondary" onclick="showTrip(${t.id})">View</button>
          <button class="btn secondary" onclick="shareTrip(${t.id}, ${!!t.share_token})">
            ${t.share_token ? 'Copy link' : 'Share'}</button>
          ${t.share_token ? `<button class="btn danger" onclick="revokeShare(${t.id})">Unshare</button>` : ''}
          <button class="btn danger" onclick="deleteTrip(${t.id})">Delete</button>
        </div>`).join('');
    }

    async function showTrip(id) {
      const res = await fetch(`/api/trips/${id}`);
      if (!res.ok) return;
      currentTrip = await res.json();
      const plan = currentTrip.plan;
      $('detail').innerHTML = `
        <div class="summary">
          <div><b>${escapeHtml(currentTrip.name)}</b></div>
          <div><b>${plan.total_places}</b> places</div>
          <div><b><span data-egp="${plan.total_cost}">${Currency.fmt(plan.total_cost)}</span></b></div>
        </div>
        <div class="toolbar no-print">
          <button class="btn secondary" onclick="window.print()">Print / PDF</button>
          <button class="btn secondary"
            onclick="downloadIcs(currentTrip.plan, currentTrip.name)">Add to calendar (.ics)</button>
          <label for="currency" style="margin:0 0 0 auto;">Currency</label>
          <select id="currency">
            <option>EGP</option><option>USD</option><option>EUR</option><option>GBP</option>
          </select>
        </div>
        <div id="trip-map" class="trip-map no-print"></div>
        <div id="days-container"></div>`;
      renderItinerary($('days-container'), plan);
      if (window.TripMap) TripMap.render($('trip-map'), plan);
      Currency.init($('currency'));
      $('detail').scrollIntoView({ behavior: 'smooth' });
    }

    async function shareTrip(id, alreadyShared) {
      const res = await fetch(`/api/trips/${id}/share`, { method: 'POST' });
      if (!res.ok) return;
      const { url } = await res.json();
      const fullUrl = location.origin + '/' + url.replace(/^\//, '');
      try {
        await navigator.clipboard.writeText(fullUrl);
        flash(`Share link copied: <a href="${url}" target="_blank">${fullUrl}</a>`);
      } catch {
        flash(`Share link: <a href="${url}" target="_blank">${fullUrl}</a>`);
      }
      if (!alreadyShared) loadTrips();
    }

    async function revokeShare(id) {
      if (!confirm('Unshare this trip? The existing link will stop working.')) return;
      await fetch(`/api/trips/${id}/share`, { method: 'DELETE' });
      flash('Link revoked.');
      loadTrips();
    }

    async function deleteTrip(id) {
      if (!confirm('Delete this trip?')) return;
      await fetch(`/api/trips/${id}`, { method: 'DELETE' });
      $('detail').innerHTML = '';
      loadTrips();
    }

    function flash(html) {
      const s = $('status');
      s.className = 'ok';
      s.innerHTML = html;
    }
  </script>
</body>
</html>
